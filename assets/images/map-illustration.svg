<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a13"/>
      <stop offset="1" stop-color="#170f0a"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2015"/>
      <stop offset="1" stop-color="#120c08"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e4c88f" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e4c88f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="240" fill="url(#sky)"/>

  <!-- distant, fainter skyline for depth -->
  <g fill="#3a2a1c" opacity="0.55">
    <rect x="-10" y="120" width="30" height="70"/>
    <rect x="24" y="105" width="26" height="85"/>
    <rect x="330" y="110" width="34" height="80"/>
    <rect x="368" y="130" width="30" height="60"/>
  </g>

  <!-- main skyline silhouette -->
  <g fill="#4a3627">
    <rect x="0" y="140" width="34" height="50"/>
    <rect x="34" y="118" width="26" height="72"/>
    <rect x="63" y="150" width="22" height="40"/>

    <!-- cathedral: base + twin spires -->
    <rect x="96" y="128" width="46" height="62"/>
    <path d="M104 128 L110 60 L116 128 Z"/>
    <path d="M122 128 L129 52 L136 128 Z"/>

    <rect x="145" y="145" width="28" height="45"/>
    <rect x="176" y="108" width="38" height="82"/>

    <!-- water tower: shaft + observation-deck cap -->
    <rect x="238" y="78" width="12" height="112"/>
    <ellipse cx="244" cy="78" rx="17" ry="10"/>
    <rect x="231" y="70" width="26" height="7" rx="2"/>

    <rect x="262" y="132" width="30" height="58"/>
    <rect x="296" y="100" width="40" height="90"/>
    <rect x="340" y="135" width="32" height="55"/>
    <rect x="374" y="150" width="26" height="40"/>
  </g>

  <!-- window lights -->
  <g fill="#e4c88f" opacity="0.75">
    <rect x="10" y="155" width="3" height="4"/>
    <rect x="20" y="165" width="3" height="4"/>
    <rect x="42" y="135" width="3" height="4"/>
    <rect x="42" y="150" width="3" height="4"/>
    <rect x="184" y="128" width="3" height="4"/>
    <rect x="198" y="140" width="3" height="4"/>
    <rect x="184" y="155" width="3" height="4"/>
    <rect x="305" y="120" width="3" height="4"/>
    <rect x="318" y="135" width="3" height="4"/>
    <rect x="305" y="150" width="3" height="4"/>
    <rect x="350" y="150" width="3" height="4"/>
  </g>

  <!-- Drava river with a low bridge -->
  <rect x="0" y="190" width="400" height="50" fill="url(#river)"/>
  <g stroke="#8a6644" stroke-opacity="0.4" stroke-width="1.5" fill="none">
    <path d="M0 202 Q100 208 200 202 T400 202"/>
    <path d="M0 216 Q100 222 200 216 T400 216"/>
    <path d="M0 230 Q100 234 200 230 T400 230"/>
  </g>
  <g stroke="#c9a063" stroke-opacity="0.55" stroke-width="2" fill="none">
    <path d="M150 190 L150 197 M180 187 L180 197 M220 187 L220 197 M250 190 L250 197"/>
    <path d="M150 193 L250 193"/>
  </g>

  <!-- our spot -->
  <circle cx="203" cy="118" r="46" fill="url(#glow2)"/>
  <g transform="translate(203,108)">
    <path d="M0 -34 C17 -34 30 -21 30 -5 C30 15 8 40 0 50 C-8 40 -30 15 -30 -5 C-30 -21 -17 -34 0 -34 Z"
          fill="#c9a063" stroke="#17110d" stroke-width="2"/>
    <circle cx="0" cy="-5" r="10" fill="#17110d"/>
  </g>
</svg>
